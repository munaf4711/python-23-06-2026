apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app
        image: mmunaf1810/python23062026:01
        ports:
        - containerPort: 5000